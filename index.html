<!DOCTYPE html>

<head>

<title>Sajikumar Style</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>

    height: 100vh;
    background: url('photo.jpg') no-repeat center center/cover;
